<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Admin — Badges</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="./css/adminlte.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <style>
            .badge-preview {
                max-width: 100px;
                max-height: 100px;
                object-fit: cover;
                border-radius: 4px;
            }
        </style>
    </head>
    <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
        <script>
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "./login.html";
            }
        </script>

        <div class="app-wrapper">
            <!-- SIDEBAR -->
            <aside
                class="app-sidebar bg-body-secondary shadow"
                data-bs-theme="dark"
            >
                <div class="sidebar-brand">
                    <a href="./index.html" class="brand-link">
                        <img
                            src="./assets/img/AdminLTELogo.png"
                            alt="Logo"
                            class="brand-image opacity-75 shadow"
                        />
                        <span class="brand-text fw-light">Admin Panel</span>
                    </a>
                </div>

                <div class="sidebar-wrapper">
                    <nav class="mt-2">
                        <ul
                            class="nav sidebar-menu flex-column"
                            data-lte-toggle="treeview"
                            role="menu"
                        >
                            <!-- Dashboard -->
                            <li class="nav-item">
                                <a href="./index.html" class="nav-link">
                                    <i class="nav-icon bi bi-speedometer2"></i>
                                    <p>Dashboard</p>
                                </a>
                            </li>

                            <!-- Users -->
                            <li class="nav-item">
                                <a href="./users.html" class="nav-link">
                                    <i class="nav-icon bi bi-people"></i>
                                    <p>Users</p>
                                </a>
                            </li>

                            <!-- Courses -->
                            <li class="nav-item">
                                <a href="./courses.html" class="nav-link">
                                    <i class="nav-icon bi bi-journal-text"></i>
                                    <p>Courses</p>
                                </a>
                            </li>

                            <!-- Badges -->
                            <li class="nav-item">
                                <a href="./badges.html" class="nav-link active">
                                    <i class="nav-icon bi bi-award"></i>
                                    <p>Badges</p>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </aside>

            <!-- HEADER -->
            <nav class="app-header navbar navbar-expand bg-body">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                data-lte-toggle="sidebar"
                                href="#"
                                role="button"
                            >
                                <i class="bi bi-list"></i>
                            </a>
                        </li>
                    </ul>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <button
                                id="logoutBtn"
                                class="btn btn-sm btn-danger"
                            >
                                Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- MAIN CONTENT -->
            <main class="app-main">
                <div class="app-content-header">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-sm-6">
                                <h3 class="mb-0">Badges</h3>
                            </div>
                            <div class="col-sm-6">
                                <button
                                    class="btn btn-success float-end"
                                    data-bs-toggle="modal"
                                    data-bs-target="#createBadgeModal"
                                >
                                    <i class="bi bi-plus-circle me-1"></i>
                                    Create Badge
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="app-content">
                    <div class="container-fluid">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">All Badges</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Image</th>
                                                <th>Name</th>
                                                <th>Description</th>
                                                <th>Course</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="badgesTable">
                                            <tr>
                                                <td
                                                    colspan="6"
                                                    class="text-center"
                                                >
                                                    <div
                                                        class="spinner-border text-primary"
                                                        role="status"
                                                    >
                                                        <span
                                                            class="visually-hidden"
                                                            >Loading...</span
                                                        >
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- CREATE BADGE MODAL -->
        <div class="modal fade" id="createBadgeModal" tabindex="-1">
            <div class="modal-dialog">
                <form id="createBadgeForm" class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Create New Badge</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Badge Name *</label>
                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea
                                name="description"
                                class="form-control"
                                rows="3"
                            ></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input
                                type="url"
                                name="imageUrl"
                                class="form-control"
                                placeholder="https://example.com/badge.png"
                            />
                            <small class="text-muted"
                                >Provide a URL to the badge image</small
                            >
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Associated Course</label>
                            <select name="courseId" class="form-select">
                                <option value="">-- No Course --</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Create
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- EDIT BADGE MODAL -->
        <div class="modal fade" id="editBadgeModal" tabindex="-1">
            <div class="modal-dialog">
                <form id="editBadgeForm" class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Badge</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="badgeId" />
                        <div class="mb-3">
                            <label class="form-label">Badge Name *</label>
                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea
                                name="description"
                                class="form-control"
                                rows="3"
                            ></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input
                                type="url"
                                name="imageUrl"
                                class="form-control"
                                placeholder="https://example.com/badge.png"
                            />
                            <small class="text-muted"
                                >Provide a URL to the badge image</small
                            >
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Associated Course</label>
                            <select name="courseId" class="form-select">
                                <option value="">-- No Course --</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            const API_BASE = "/api";
            const ADMIN_API = `${API_BASE}/admin`;
            const authHeaders = () => ({
                "Content-Type": "application/json",
                Authorization: `Bearer ${localStorage.getItem("token")}`,
            });

            // Logout functionality
            document
                .getElementById("logoutBtn")
                .addEventListener("click", () => {
                    localStorage.removeItem("token");
                    window.location.href = "./login.html";
                });

            // Load courses for dropdowns
            async function loadCourses() {
                try {
                    const res = await fetch(`${ADMIN_API}/courses`, {
                        headers: authHeaders(),
                    });
                    if (!res.ok) return;
                    const courses = await res.json();

                    // Update both dropdown selects
                    const createSelect = document.querySelector(
                        "#createBadgeForm select[name='courseId']",
                    );
                    const editSelect = document.querySelector(
                        "#editBadgeForm select[name='courseId']",
                    );

                    const options = courses
                        .map(
                            (course) =>
                                `<option value="${course.id}">${course.title}</option>`,
                        )
                        .join("");

                    if (createSelect) {
                        createSelect.innerHTML =
                            '<option value="">-- No Course --</option>' + options;
                    }
                    if (editSelect) {
                        editSelect.innerHTML =
                            '<option value="">-- No Course --</option>' + options;
                    }
                } catch (err) {
                    console.error("Failed to load courses:", err);
                }
            }

            // Load badges
            async function loadBadges() {
                try {
                    const res = await fetch(`${ADMIN_API}/badges`, {
                        headers: authHeaders(),
                    });
                    console.debug("[badges] loadBadges status:", res.status);
                    if (!res.ok) {
                        let body = await res.text().catch(() => null);
                        console.error(
                            "[badges] loadBadges failed:",
                            res.status,
                            body,
                        );
                        document.getElementById("badgesTable").innerHTML =
                            `<tr><td colspan="6" class="text-danger text-center">Failed to load badges (status ${res.status})</td></tr>`;
                        return;
                    }
                    const badges = await res.json();
                    console.debug(
                        "[badges] loadBadges got",
                        Array.isArray(badges)
                            ? badges.length
                            : typeof badges,
                        "badges",
                    );
                    renderBadges(badges);
                } catch (err) {
                    console.error("[badges] loadBadges exception:", err);
                    document.getElementById("badgesTable").innerHTML =
                        '<tr><td colspan="6" class="text-danger text-center">Failed to load badges</td></tr>';
                }
            }

            function renderBadges(badges) {
                const tbody = document.getElementById("badgesTable");
                if (!badges.length) {
                    tbody.innerHTML =
                        '<tr><td colspan="6" class="text-muted text-center">No badges found</td></tr>';
                    return;
                }

                tbody.innerHTML = badges
                    .map(
                        (badge) => `
                <tr>
                    <td>${badge.id}</td>
                    <td>
                        ${
                            badge.imageUrl
                                ? `<img src="${badge.imageUrl}" alt="${badge.name}" class="badge-preview" />`
                                : '<span class="text-muted">No image</span>'
                        }
                    </td>
                    <td><strong>${badge.name}</strong></td>
                    <td>${badge.description ? badge.description.substring(0, 40) + "..." : "-"}</td>
                    <td>${badge.course ? badge.course.title : "-"}</td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editBadge(${badge.id})">
                            <i class="bi bi-pencil"></i> Edit
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteBadge(${badge.id})">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `,
                    )
                    .join("");
            }

            // Create badge
            document
                .getElementById("createBadgeForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const payload = {
                        name: form.name.value.trim(),
                        description: form.description.value.trim() || null,
                        imageUrl: form.imageUrl.value.trim() || null,
                        courseId: form.courseId.value
                            ? Number(form.courseId.value)
                            : null,
                    };

                    try {
                        const res = await fetch(`${ADMIN_API}/badges`, {
                            method: "POST",
                            headers: authHeaders(),
                            body: JSON.stringify(payload),
                        });
                        console.debug(
                            "[badges] createBadge status:",
                            res.status,
                        );
                        if (!res.ok) {
                            const text = await res.text().catch(() => null);
                            console.error(
                                "[badges] createBadge failed:",
                                res.status,
                                text,
                            );
                            alert(
                                `Failed to create badge: ${text || res.status}`,
                            );
                            return;
                        }

                        const created = await res.json().catch(() => null);
                        console.debug("[badges] created badge:", created);

                        bootstrap.Modal.getInstance(
                            document.getElementById("createBadgeModal"),
                        ).hide();
                        form.reset();
                        loadBadges();
                        alert("Badge created successfully!");
                    } catch (err) {
                        alert("Failed to create badge");
                        console.error("[badges] createBadge exception:", err);
                    }
                });

            // Edit badge
            async function editBadge(id) {
                try {
                    const res = await fetch(`${ADMIN_API}/badges`, {
                        headers: authHeaders(),
                    });
                    console.debug("[badges] editBadge status:", res.status);
                    if (!res.ok) {
                        const text = await res.text().catch(() => null);
                        console.error(
                            "[badges] editBadge failed:",
                            res.status,
                            text,
                        );
                        alert(`Failed to load badge: ${text || res.status}`);
                        return;
                    }
                    const badges = await res.json();
                    const badge = badges.find((b) => b.id === id);

                    if (!badge) {
                        alert("Badge not found");
                        return;
                    }

                    const form = document.getElementById("editBadgeForm");
                    form.badgeId.value = badge.id;
                    form.name.value = badge.name;
                    form.description.value = badge.description || "";
                    form.imageUrl.value = badge.imageUrl || "";
                    form.courseId.value = badge.courseId || "";

                    new bootstrap.Modal(
                        document.getElementById("editBadgeModal"),
                    ).show();
                } catch (err) {
                    alert("Failed to load badge");
                    console.error("[badges] editBadge exception:", err);
                }
            }

            document
                .getElementById("editBadgeForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const id = form.badgeId.value;
                    const payload = {
                        name: form.name.value.trim(),
                        description: form.description.value.trim() || null,
                        imageUrl: form.imageUrl.value.trim() || null,
                        courseId: form.courseId.value
                            ? Number(form.courseId.value)
                            : null,
                    };

                    try {
                        const res = await fetch(`${ADMIN_API}/badges/${id}`, {
                            method: "PUT",
                            headers: authHeaders(),
                            body: JSON.stringify(payload),
                        });
                        console.debug(
                            "[badges] updateBadge status:",
                            res.status,
                        );
                        if (!res.ok) {
                            const text = await res.text().catch(() => null);
                            console.error(
                                "[badges] updateBadge failed:",
                                res.status,
                                text,
                            );
                            alert(
                                `Failed to update badge: ${text || res.status}`,
                            );
                            return;
                        }

                        const updated = await res.json().catch(() => null);
                        console.debug("[badges] updated badge:", updated);

                        bootstrap.Modal.getInstance(
                            document.getElementById("editBadgeModal"),
                        ).hide();
                        loadBadges();
                        alert("Badge updated successfully!");
                    } catch (err) {
                        alert("Failed to update badge");
                        console.error("[badges] updateBadge exception:", err);
                    }
                });

            // Delete badge
            async function deleteBadge(id) {
                if (
                    !confirm(
                        "Are you sure you want to delete this badge? This action cannot be undone.",
                    )
                )
                    return;

                try {
                    const res = await fetch(`${ADMIN_API}/badges/${id}`, {
                        method: "DELETE",
                        headers: authHeaders(),
                    });
                    if (!res.ok) throw new Error("Failed to delete badge");

                    loadBadges();
                    alert("Badge deleted successfully!");
                } catch (err) {
                    alert("Failed to delete badge");
                    console.error(err);
                }
            }

            // Initial load
            loadCourses();
            loadBadges();
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./js/adminlte.js"></script>
    </body>
</html>
