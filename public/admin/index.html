<!doctype html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <title>Admin Panel</title>

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=yes"
        />

        <link rel="preload" href="./css/adminlte.css" as="style" />
        <link rel="stylesheet" href="./css/adminlte.css" />

        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
            crossorigin="anonymous"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
            crossorigin="anonymous"
        />
    </head>

    <body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">
        <!-- AUTH CHECK -->
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const token = localStorage.getItem("token");

                if (!token) {
                    window.location.href = "./login.html";
                }
            });
        </script>

        <div class="app-wrapper">
            <!-- HEADER -->
            <nav class="app-header navbar navbar-expand bg-body">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                data-lte-toggle="sidebar"
                                href="#"
                                role="button"
                            >
                                <i class="bi bi-list"></i>
                            </a>
                        </li>
                    </ul>

                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <button
                                id="logoutBtn"
                                class="btn btn-sm btn-danger"
                            >
                                Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- LOGOUT LOGIC -->
            <script>
                document.addEventListener("DOMContentLoaded", () => {
                    const logoutBtn = document.getElementById("logoutBtn");
                    if (logoutBtn) {
                        logoutBtn.addEventListener("click", () => {
                            localStorage.removeItem("token");
                            window.location.href = "./login.html";
                        });
                    }
                });
            </script>

            <!-- SIDEBAR -->
            <aside
                class="app-sidebar bg-body-secondary shadow"
                data-bs-theme="dark"
            >
                <div class="sidebar-brand">
                    <a href="./index.html" class="brand-link">
                        <img
                            src="./assets/img/AdminLTELogo.png"
                            alt="Logo"
                            class="brand-image opacity-75 shadow"
                        />
                        <span class="brand-text fw-light">Admin Panel</span>
                    </a>
                </div>

                <div class="sidebar-wrapper">
                    <nav class="mt-2">
                        <ul
                            class="nav sidebar-menu flex-column"
                            data-lte-toggle="treeview"
                            role="menu"
                        >
                            <!-- Dashboard -->
                            <li class="nav-item">
                                <a href="./index.html" class="nav-link active">
                                    <i class="nav-icon bi bi-speedometer2"></i>
                                    <p>Dashboard</p>
                                </a>
                            </li>

                            <!-- Users -->
                            <li class="nav-item">
                                <a href="./users.html" class="nav-link">
                                    <i class="nav-icon bi bi-people"></i>
                                    <p>Users</p>
                                </a>
                            </li>

                            <!-- Courses -->
                            <li class="nav-item">
                                <a href="./courses.html" class="nav-link">
                                    <i class="nav-icon bi bi-journal-text"></i>
                                    <p>Courses</p>
                                </a>
                            </li>

                            <!-- Lessons -->
                            <li class="nav-item">
                                <a href="./lessons.html" class="nav-link">
                                    <i
                                        class="nav-icon bi bi-collection-play"
                                    ></i>
                                    <p>Lessons</p>
                                </a>
                            </li>

                            <!-- Tests -->
                            <li class="nav-item">
                                <a href="./tests.html" class="nav-link">
                                    <i
                                        class="nav-icon bi bi-question-circle"
                                    ></i>
                                    <p>Tests</p>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </aside>

            <!-- MAIN -->
            <main class="app-main">
                <div class="app-content-header">
                    <div class="container-fluid">
                        <h3 class="mb-0">Dashboard</h3>
                    </div>
                </div>

                <div class="app-content">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-lg-6">
                                <div class="card p-4">
                                    <h4>Welcome</h4>
                                    <p>This is your admin dashboard.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- FOOTER -->
            <footer class="app-footer">
                <div class="float-end d-none d-sm-inline">Admin panel</div>
                <strong>© 2025</strong>
            </footer>
        </div>

        <!-- SCRIPTS -->
        <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
        <script src="./js/adminlte.js"></script>
    </body>
</html>
