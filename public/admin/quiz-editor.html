<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <title>Admin — Quiz Editor</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="./css/adminlte.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <style>
            .question-item {
                cursor: default;
            }
            .answer-item {
                cursor: default;
            }
            .small-muted {
                font-size: 0.85rem;
                color: #6c757d;
            }
            .answers-list {
                margin-top: 0.75rem;
            }
        </style>
    </head>
    <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
        <script>
            const token = localStorage.getItem("token");
            if (!token) window.location.href = "./login.html";
        </script>

        <script>
            // parse query params early
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get("courseId");
            const sectionId = urlParams.get("sectionId");
            const lessonId = urlParams.get("lessonId");
            const quizId = urlParams.get("quizId");

            if (!courseId || !sectionId || !lessonId || !quizId) {
                // redirect back to course editor if params missing
                alert(
                    "Missing route parameters (courseId, sectionId, lessonId or quizId)",
                );
                window.location.href = "./courses.html";
            }
        </script>

        <div class="app-wrapper">
            <aside
                class="app-sidebar bg-body-secondary shadow"
                data-bs-theme="dark"
            >
                <div class="sidebar-brand">
                    <a href="./index.html" class="brand-link">
                        <img
                            src="./assets/img/AdminLTELogo.png"
                            alt="Logo"
                            class="brand-image opacity-75 shadow"
                        />
                        <span class="brand-text fw-light">Admin Panel</span>
                    </a>
                </div>
                <div class="sidebar-wrapper">
                    <nav class="mt-2">
                        <ul class="nav sidebar-menu flex-column">
                            <li class="nav-item">
                                <a href="./index.html" class="nav-link">
                                    <i class="nav-icon bi bi-speedometer2"></i>
                                    <p>Dashboard</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="./users.html" class="nav-link">
                                    <i class="nav-icon bi bi-people"></i>
                                    <p>Users</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="./courses.html" class="nav-link">
                                    <i class="nav-icon bi bi-journal-text"></i>
                                    <p>Courses</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="./quiz-editor.html" class="nav-link">
                                    <i class="nav-icon bi bi-book"></i>
                                    <p>Quizzes</p>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </aside>

            <nav class="app-header navbar navbar-expand bg-body">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                data-lte-toggle="sidebar"
                                href="#"
                                role="button"
                                ><i class="bi bi-list"></i
                            ></a>
                        </li>
                    </ul>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item me-2">
                            <a
                                id="backToCourseBtn"
                                class="btn btn-sm btn-secondary"
                                ><i class="bi bi-arrow-left"></i> Back</a
                            >
                        </li>
                        <li class="nav-item">
                            <button
                                id="logoutBtn"
                                class="btn btn-sm btn-danger"
                            >
                                Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="app-main">
                <div class="app-content-header">
                    <div class="container-fluid">
                        <h3 class="mb-0" id="quizTitle">Quiz editor</h3>
                        <p class="text-muted" id="quizMeta"></p>
                    </div>
                </div>

                <div class="app-content">
                    <div class="container-fluid">
                        <div class="card">
                            <div
                                class="card-header d-flex justify-content-between align-items-center"
                            >
                                <h5 class="mb-0">Questions</h5>
                                <div>
                                    <button
                                        class="btn btn-sm btn-success"
                                        id="btnAddQuestion"
                                    >
                                        <i class="bi bi-plus"></i> Add Question
                                    </button>
                                </div>
                            </div>
                            <div class="card-body">
                                <div id="questionsContainer">
                                    <div class="text-center py-3">
                                        <div class="spinner-border"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- QUESTION MODAL -->
        <div class="modal fade" id="questionModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <form id="questionForm" class="modal-content">
                    <div class="modal-header">
                        <h5 id="questionModalTitle">Create Question</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="questionId" />
                        <div class="mb-3">
                            <label class="form-label">Question Text *</label>
                            <textarea
                                name="questionText"
                                class="form-control"
                                rows="3"
                                required
                            ></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Question Type</label>
                            <select name="questionType" class="form-select">
                                <option value="single">Single Choice</option>
                                <option value="multiple">
                                    Multiple Choice
                                </option>
                                <option value="text">Text Answer</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Save Question
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ANSWER MODAL -->
        <div class="modal fade" id="answerModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 id="answerModalTitle">Answers</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <!-- dynamic content: add/edit form + answers list -->
                        <div id="answerModalBody">
                            <div class="text-center py-3">
                                <div class="spinner-border"></div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Close
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const API_BASE = "/api";
            const ADMIN_API = `${API_BASE}/admin`;
            const authHeaders = () => ({
                "Content-Type": "application/json",
                Authorization: `Bearer ${localStorage.getItem("token")}`,
            });

            // set correct back link with quiz context
            document.getElementById("backToCourseBtn").href =
                `./course-editor.html?id=${courseId}`;

            document
                .getElementById("logoutBtn")
                .addEventListener("click", () => {
                    localStorage.removeItem("token");
                    window.location.href = "./login.html";
                });

            // Helpers
            function el(selector) {
                return document.querySelector(selector);
            }
            function qsa(selector) {
                return Array.from(document.querySelectorAll(selector));
            }
            function safeParseJson(text) {
                try {
                    return JSON.parse(text);
                } catch (e) {
                    return null;
                }
            }
            function esc(text) {
                if (text === null || text === undefined) return "";
                return String(text)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            // State
            let quiz = null;
            let questions = [];
            let currentQuestionForAnswers = null;

            // Load quiz and questions
            async function loadQuizAndQuestions() {
                const container = el("#questionsContainer");
                container.innerHTML =
                    '<div class="text-center py-3"><div class="spinner-border"></div></div>';
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) {
                        const txt = await res.text().catch(() => null);
                        throw new Error(txt || `Status ${res.status}`);
                    }
                    quiz = await res.json();
                    el("#quizTitle").textContent =
                        `Quiz: ${quiz.title || "Untitled"}`;
                    el("#quizMeta").textContent =
                        `Quiz ID: ${quiz.id} • Lesson ${lessonId} • Section ${sectionId} • Course ${courseId}`;
                    // Use questions from quiz payload (controller includes questions)
                    questions = Array.isArray(quiz.questions)
                        ? quiz.questions
                        : [];
                    renderQuestions();
                } catch (err) {
                    console.error(err);
                    container.innerHTML = `<div class="alert alert-danger">Failed to load quiz/questions: ${esc(err.message || err)}</div>`;
                }
            }

            function renderQuestions() {
                const container = el("#questionsContainer");
                if (!questions.length) {
                    container.innerHTML =
                        '<div class="alert alert-info">No questions yet. Add one using the button above.</div>';
                    return;
                }

                container.innerHTML = questions
                    .map((q) => {
                        const answersHtml = (q.answers || [])
                            .map((a) => {
                                return `<li class="list-group-item d-flex justify-content-between align-items-center">
                      <div>${esc(a.answerText)} ${a.isCorrect ? '<span class="badge bg-success ms-2">Correct</span>' : ""}</div>
                      <div>
                        <button class="btn btn-sm btn-warning me-1" onclick="openAnswerEditModal(${q.id}, ${a.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteAnswer(${q.id}, ${a.id})"><i class="bi bi-trash"></i></button>
                      </div>
                    </li>`;
                            })
                            .join("");
                        return `<div class="card mb-3 question-item" id="question-${q.id}">
                    <div class="card-body">
                      <div class="d-flex justify-content-between align-items-start">
                        <div>
                          <h6 class="mb-1">${esc(q.questionText)}</h6>
                          <div class="small-muted">Type: ${esc(q.questionType || "single")} • Question ID: ${q.id}</div>
                        </div>
                        <div>
                          <button class="btn btn-sm btn-info me-1" onclick="openAnswersModal(${q.id})"><i class="bi bi-list-check"></i> Answers</button>
                          <button class="btn btn-sm btn-warning me-1" onclick="openQuestionModal(${q.id})"><i class="bi bi-pencil"></i></button>
                          <button class="btn btn-sm btn-danger" onclick="deleteQuestion(${q.id})"><i class="bi bi-trash"></i></button>
                        </div>
                      </div>
                      <div class="answers-list">
                        <ul class="list-group">${answersHtml}</ul>
                      </div>
                    </div>
                  </div>`;
                    })
                    .join("");
            }

            // Question CRUD
            document
                .getElementById("btnAddQuestion")
                .addEventListener("click", () => openQuestionModal());

            function openQuestionModal(question = null) {
                const form = document.getElementById("questionForm");
                form.questionId.value = question ? question.id : "";
                form.questionText.value = question ? question.questionText : "";
                form.questionType.value = question
                    ? question.questionType
                    : "single";
                document.getElementById("questionModalTitle").textContent =
                    question ? "Edit Question" : "Create Question";
                new bootstrap.Modal(
                    document.getElementById("questionModal"),
                ).show();
            }

            document
                .getElementById("questionForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const questionId = form.questionId.value;
                    const payload = {
                        questionText: form.questionText.value.trim(),
                        questionType: form.questionType.value,
                    };
                    try {
                        const url = questionId
                            ? `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${questionId}`
                            : `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions`;
                        const method = questionId ? "PUT" : "POST";
                        const res = await fetch(url, {
                            method,
                            headers: authHeaders(),
                            body: JSON.stringify(payload),
                        });
                        const text = await res.text();
                        const body = safeParseJson(text) || text;
                        if (!res.ok)
                            throw new Error(
                                body?.error || `Status ${res.status}`,
                            );
                        bootstrap.Modal.getInstance(
                            document.getElementById("questionModal"),
                        ).hide();
                        // reload quiz and questions
                        await loadQuizAndQuestions();
                        alert(
                            questionId
                                ? "Question updated"
                                : "Question created",
                        );
                    } catch (err) {
                        alert(
                            "Failed to save question: " + (err.message || err),
                        );
                        console.error(err);
                    }
                });

            async function editQuestion(id) {
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${id}`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) {
                        const t = await res.text().catch(() => null);
                        throw new Error(t || `Status ${res.status}`);
                    }
                    const question = await res.json();
                    openQuestionModal(question);
                } catch (err) {
                    alert("Failed to load question");
                    console.error(err);
                }
            }

            async function deleteQuestion(id) {
                if (!confirm("Delete this question and all its answers?"))
                    return;
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${id}`,
                        { method: "DELETE", headers: authHeaders() },
                    );
                    if (!res.ok) {
                        const t = await res.text().catch(() => null);
                        throw new Error(t || `Status ${res.status}`);
                    }
                    await loadQuizAndQuestions();
                    alert("Question deleted");
                } catch (err) {
                    alert("Failed to delete question");
                    console.error(err);
                }
            }

            // Answers modal & CRUD
            async function openAnswersModal(questionId) {
                currentQuestionForAnswers = questionId;
                // fill modal body with loader then load answers
                const body = el("#answerModalBody");
                body.innerHTML =
                    '<div class="text-center py-3"><div class="spinner-border"></div></div>';
                new bootstrap.Modal(
                    document.getElementById("answerModal"),
                ).show();
                await loadAnswers(questionId);
            }

            async function loadAnswers(questionId) {
                const modalBody = el("#answerModalBody");
                try {
                    // fetch question to get its answers
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${questionId}`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) {
                        const t = await res.text().catch(() => null);
                        throw new Error(t || `Status ${res.status}`);
                    }
                    const q = await res.json();
                    const answers = Array.isArray(q.answers) ? q.answers : [];
                    // build modal content: form at top + list
                    modalBody.innerHTML = `
            <div class="mb-3">
              <input type="hidden" id="modalAnswerId" value="" />
              <label class="form-label">Answer Text *</label>
              <input type="text" id="modalAnswerText" class="form-control" />
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="modalAnswerIsCorrect" />
              <label class="form-check-label" for="modalAnswerIsCorrect">Is Correct</label>
            </div>
            <div class="mb-3">
              <button class="btn btn-primary" id="modalSaveAnswerBtn">Save Answer</button>
              <button class="btn btn-secondary ms-2" id="modalResetAnswerBtn">Reset</button>
            </div>
            <hr />
            <div>
              <h6>Existing answers</h6>
              <div id="modalAnswersList">
                ${answers.length ? `<ul class="list-group">${answers.map((a) => `<li class="list-group-item d-flex justify-content-between align-items-center" data-answer-id="${a.id}"><div>${esc(a.answerText)} ${a.isCorrect ? '<span class="badge bg-success ms-2">Correct</span>' : ""}</div><div><button class="btn btn-sm btn-warning me-1" data-edit-id="${a.id}"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-danger" data-delete-id="${a.id}"><i class="bi bi-trash"></i></button></div></li>`).join("")}</ul>` : '<div class="text-muted">No answers yet</div>'}
              </div>
            </div>
          `;
                    // attach handlers
                    el("#modalSaveAnswerBtn").addEventListener(
                        "click",
                        submitAnswerFromModal,
                    );
                    el("#modalResetAnswerBtn").addEventListener("click", () => {
                        el("#modalAnswerId").value = "";
                        el("#modalAnswerText").value = "";
                        el("#modalAnswerIsCorrect").checked = false;
                    });
                    // edit/delete buttons
                    modalBody
                        .querySelectorAll("[data-edit-id]")
                        .forEach((btn) => {
                            btn.addEventListener("click", (ev) => {
                                const aid = btn.getAttribute("data-edit-id");
                                const answer = answers.find(
                                    (x) => String(x.id) === String(aid),
                                );
                                if (!answer) return;
                                el("#modalAnswerId").value = answer.id;
                                el("#modalAnswerText").value =
                                    answer.answerText || "";
                                el("#modalAnswerIsCorrect").checked =
                                    !!answer.isCorrect;
                            });
                        });
                    modalBody
                        .querySelectorAll("[data-delete-id]")
                        .forEach((btn) => {
                            btn.addEventListener("click", async (ev) => {
                                const aid = btn.getAttribute("data-delete-id");
                                if (!confirm("Delete this answer?")) return;
                                try {
                                    const delRes = await fetch(
                                        `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${questionId}/answers/${aid}`,
                                        {
                                            method: "DELETE",
                                            headers: authHeaders(),
                                        },
                                    );
                                    if (!delRes.ok) {
                                        const t = await delRes
                                            .text()
                                            .catch(() => null);
                                        throw new Error(
                                            t || `Status ${delRes.status}`,
                                        );
                                    }
                                    // reload answers list
                                    await loadAnswers(questionId);
                                } catch (err) {
                                    alert(
                                        "Failed to delete answer: " +
                                            (err.message || err),
                                    );
                                    console.error(err);
                                }
                            });
                        });
                } catch (err) {
                    console.error(err);
                    modalBody.innerHTML = `<div class="alert alert-danger">Failed to load answers: ${esc(err.message || err)}</div>`;
                }
            }

            async function submitAnswerFromModal(e) {
                try {
                    const modalBody = el("#answerModalBody");
                    const answerId = el("#modalAnswerId").value;
                    const answerText = el("#modalAnswerText").value.trim();
                    const isCorrect = !!el("#modalAnswerIsCorrect").checked;
                    if (!answerText) return alert("Answer text is required");
                    const qid = currentQuestionForAnswers;
                    const url = answerId
                        ? `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${qid}/answers/${answerId}`
                        : `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${qid}/answers`;
                    const method = answerId ? "PUT" : "POST";
                    const payload = { answerText, isCorrect };
                    const res = await fetch(url, {
                        method,
                        headers: authHeaders(),
                        body: JSON.stringify(payload),
                    });
                    const text = await res.text();
                    const body = safeParseJson(text) || text;
                    if (!res.ok)
                        throw new Error(body?.error || `Status ${res.status}`);
                    // on success reset and reload answers
                    el("#modalAnswerId").value = "";
                    el("#modalAnswerText").value = "";
                    el("#modalAnswerIsCorrect").checked = false;
                    await loadAnswers(qid);
                } catch (err) {
                    alert("Failed to save answer: " + (err.message || err));
                    console.error(err);
                }
            }

            async function openAnswerEditModal(questionId, answerId) {
                // open answers modal then prefill fields for edit
                currentQuestionForAnswers = questionId;
                await openAnswersModal(questionId);
                // Wait a tick to ensure DOM created
                setTimeout(async () => {
                    // loadAnswers already fetched and rendered; find answer element and trigger edit
                    const input = el("#modalAnswerId");
                    const text = el("#modalAnswerText");
                    const check = el("#modalAnswerIsCorrect");
                    try {
                        const res = await fetch(
                            `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${questionId}/answers/${answerId}`,
                            { headers: authHeaders() },
                        );
                        if (!res.ok) throw new Error("Failed to load answer");
                        const ans = await res.json();
                        if (input) input.value = ans.id;
                        if (text) text.value = ans.answerText || "";
                        if (check) check.checked = !!ans.isCorrect;
                    } catch (err) {
                        console.error(err);
                        alert("Failed to load answer for edit");
                    }
                }, 200);
            }

            async function deleteAnswer(questionId, answerId) {
                if (!confirm("Delete this answer?")) return;
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons/${lessonId}/quizzes/${quizId}/questions/${questionId}/answers/${answerId}`,
                        { method: "DELETE", headers: authHeaders() },
                    );
                    if (!res.ok) {
                        const t = await res.text().catch(() => null);
                        throw new Error(t || `Status ${res.status}`);
                    }
                    await loadQuizAndQuestions();
                } catch (err) {
                    alert("Failed to delete answer");
                    console.error(err);
                }
            }

            // init
            (async function init() {
                await loadQuizAndQuestions();
            })();
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./js/adminlte.js"></script>
    </body>
</html>
