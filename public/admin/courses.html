<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <title>Admin — Courses</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="./css/adminlte.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
    </head>
    <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
        <script>
            const token = localStorage.getItem("token");
            if (!token) {
                alert("No token found. Login first.");
                window.location.href = "./login.html";
            }
        </script>

        <div class="app-wrapper">
            <!-- SIDEBAR -->
            <aside
                class="app-sidebar bg-body-secondary shadow"
                data-bs-theme="dark"
            >
                <div class="sidebar-brand">
                    <a href="./index.html" class="brand-link">
                        <img
                            src="./assets/img/AdminLTELogo.png"
                            alt="Logo"
                            class="brand-image opacity-75 shadow"
                        />
                        <span class="brand-text fw-light">Admin Panel</span>
                    </a>
                </div>

                <div class="sidebar-wrapper">
                    <nav class="mt-2">
                        <ul
                            class="nav sidebar-menu flex-column"
                            data-lte-toggle="treeview"
                            role="menu"
                        >
                            <!-- Dashboard -->
                            <li class="nav-item">
                                <a href="./index.html" class="nav-link">
                                    <i class="nav-icon bi bi-speedometer2"></i>
                                    <p>Dashboard</p>
                                </a>
                            </li>

                            <!-- Users -->
                            <li class="nav-item">
                                <a href="./users.html" class="nav-link">
                                    <i class="nav-icon bi bi-people"></i>
                                    <p>Users</p>
                                </a>
                            </li>

                            <!-- Courses -->
                            <li class="nav-item">
                                <a
                                    href="./courses.html"
                                    class="nav-link active"
                                >
                                    <i class="nav-icon bi bi-journal-text"></i>
                                    <p>Courses</p>
                                </a>
                            </li>

                            <!-- Quizzes -->
                            <li class="nav-item">
                                <a href="./quiz-editor.html" class="nav-link">
                                    <i class="nav-icon bi bi-book"></i>
                                    <p>Quizzes</p>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </aside>

            <!-- HEADER -->
            <nav class="app-header navbar navbar-expand bg-body">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                data-lte-toggle="sidebar"
                                href="#"
                                role="button"
                            >
                                <i class="bi bi-list"></i>
                            </a>
                        </li>
                    </ul>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <button
                                id="logoutBtn"
                                class="btn btn-sm btn-danger"
                            >
                                Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- MAIN CONTENT -->
            <main class="app-main">
                <div class="app-content-header">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-sm-6">
                                <h3 class="mb-0">Courses</h3>
                            </div>
                            <div class="col-sm-6">
                                <button
                                    class="btn btn-success float-end"
                                    data-bs-toggle="modal"
                                    data-bs-target="#createCourseModal"
                                >
                                    <i class="bi bi-plus-circle me-1"></i>
                                    Create Course
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="app-content">
                    <div class="container-fluid">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">All Courses</h5>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Title</th>
                                                <th>Category</th>
                                                <th>Description</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody id="coursesTable">
                                            <tr>
                                                <td
                                                    colspan="5"
                                                    class="text-center"
                                                >
                                                    <div
                                                        class="spinner-border text-primary"
                                                        role="status"
                                                    >
                                                        <span
                                                            class="visually-hidden"
                                                            >Loading...</span
                                                        >
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- CREATE COURSE MODAL -->
        <div class="modal fade" id="createCourseModal" tabindex="-1">
            <div class="modal-dialog">
                <form id="createCourseForm" class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Create New Course</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea
                                name="description"
                                class="form-control"
                                rows="3"
                            ></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input
                                type="text"
                                name="category"
                                class="form-control"
                            />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Create
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- EDIT COURSE MODAL -->
        <div class="modal fade" id="editCourseModal" tabindex="-1">
            <div class="modal-dialog">
                <form id="editCourseForm" class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Course</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="courseId" />
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea
                                name="description"
                                class="form-control"
                                rows="3"
                            ></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <input
                                type="text"
                                name="category"
                                class="form-control"
                            />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script>
            const API_BASE = "/api";
            const ADMIN_API = `${API_BASE}/admin`;
            const authHeaders = () => ({
                "Content-Type": "application/json",
                Authorization: `Bearer ${localStorage.getItem("token")}`,
            });

            // Logout
            document
                .getElementById("logoutBtn")
                .addEventListener("click", () => {
                    localStorage.removeItem("token");
                    window.location.href = "./login.html";
                });

            // Load courses
            async function loadCourses() {
                try {
                    const res = await fetch(`${ADMIN_API}/courses`, {
                        headers: authHeaders(),
                    });
                    console.debug("[courses] loadCourses status:", res.status);
                    if (!res.ok) {
                        let body = await res.text().catch(() => null);
                        console.error(
                            "[courses] loadCourses failed:",
                            res.status,
                            body,
                        );
                        document.getElementById("coursesTable").innerHTML =
                            `<tr><td colspan="5" class="text-danger text-center">Failed to load courses (status ${res.status})</td></tr>`;
                        return;
                    }
                    const courses = await res.json();
                    console.debug(
                        "[courses] loadCourses got",
                        Array.isArray(courses)
                            ? courses.length
                            : typeof courses,
                        "courses",
                    );
                    renderCourses(courses);
                } catch (err) {
                    console.error("[courses] loadCourses exception:", err);
                    document.getElementById("coursesTable").innerHTML =
                        '<tr><td colspan="5" class="text-danger text-center">Failed to load courses</td></tr>';
                }
            }

            function renderCourses(courses) {
                const tbody = document.getElementById("coursesTable");
                if (!courses.length) {
                    tbody.innerHTML =
                        '<tr><td colspan="5" class="text-muted text-center">No courses found</td></tr>';
                    return;
                }

                tbody.innerHTML = courses
                    .map(
                        (course) => `
                <tr>
                    <td>${course.id}</td>
                    <td><strong>${course.title}</strong></td>
                    <td><span class="badge bg-info">${course.category || "N/A"}</span></td>
                    <td>${course.description ? course.description.substring(0, 50) + "..." : "No description"}</td>
                    <td>
                        <a href="./course-editor.html?id=${course.id}" class="btn btn-sm btn-primary me-1">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <button class="btn btn-sm btn-warning me-1" onclick="editCourse(${course.id})">
                            <i class="bi bi-gear"></i> Settings
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCourse(${course.id})">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `,
                    )
                    .join("");
            }

            // Create course
            document
                .getElementById("createCourseForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const payload = {
                        title: form.title.value.trim(),
                        description: form.description.value.trim(),
                        category: form.category.value.trim() || null,
                    };

                    try {
                        const res = await fetch(`${ADMIN_API}/courses`, {
                            method: "POST",
                            headers: authHeaders(),
                            body: JSON.stringify(payload),
                        });
                        console.debug(
                            "[courses] createCourse status:",
                            res.status,
                        );
                        if (!res.ok) {
                            const text = await res.text().catch(() => null);
                            console.error(
                                "[courses] createCourse failed:",
                                res.status,
                                text,
                            );
                            alert(
                                `Failed to create course: ${text || res.status}`,
                            );
                            return;
                        }

                        const created = await res.json().catch(() => null);
                        console.debug("[courses] created course:", created);

                        bootstrap.Modal.getInstance(
                            document.getElementById("createCourseModal"),
                        ).hide();
                        form.reset();
                        loadCourses();
                        alert("Course created successfully!");
                    } catch (err) {
                        alert("Failed to create course");
                        console.error("[courses] createCourse exception:", err);
                    }
                });

            // Edit course
            async function editCourse(id) {
                try {
                    const res = await fetch(`${ADMIN_API}/courses/${id}`, {
                        headers: authHeaders(),
                    });
                    console.debug("[courses] editCourse status:", res.status);
                    if (!res.ok) {
                        const text = await res.text().catch(() => null);
                        console.error(
                            "[courses] editCourse failed:",
                            res.status,
                            text,
                        );
                        alert(`Failed to load course: ${text || res.status}`);
                        return;
                    }
                    const course = await res.json();

                    const form = document.getElementById("editCourseForm");
                    form.courseId.value = course.id;
                    form.title.value = course.title;
                    form.description.value = course.description || "";
                    form.category.value = course.category || "";

                    new bootstrap.Modal(
                        document.getElementById("editCourseModal"),
                    ).show();
                } catch (err) {
                    alert("Failed to load course");
                    console.error("[courses] editCourse exception:", err);
                }
            }

            document
                .getElementById("editCourseForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const id = form.courseId.value;
                    const payload = {
                        title: form.title.value.trim(),
                        description: form.description.value.trim(),
                        category: form.category.value.trim() || null,
                    };

                    try {
                        const res = await fetch(`${ADMIN_API}/courses/${id}`, {
                            method: "PUT",
                            headers: authHeaders(),
                            body: JSON.stringify(payload),
                        });
                        console.debug(
                            "[courses] updateCourse status:",
                            res.status,
                        );
                        if (!res.ok) {
                            const text = await res.text().catch(() => null);
                            console.error(
                                "[courses] updateCourse failed:",
                                res.status,
                                text,
                            );
                            alert(
                                `Failed to update course: ${text || res.status}`,
                            );
                            return;
                        }

                        const updated = await res.json().catch(() => null);
                        console.debug("[courses] updated course:", updated);

                        bootstrap.Modal.getInstance(
                            document.getElementById("editCourseModal"),
                        ).hide();
                        loadCourses();
                        alert("Course updated successfully!");
                    } catch (err) {
                        alert("Failed to update course");
                        console.error("[courses] updateCourse exception:", err);
                    }
                });

            // Delete course
            async function deleteCourse(id) {
                if (
                    !confirm(
                        "Are you sure you want to delete this course? This action cannot be undone.",
                    )
                )
                    return;

                try {
                    const res = await fetch(`${ADMIN_API}/courses/${id}`, {
                        method: "DELETE",
                        headers: authHeaders(),
                    });
                    if (!res.ok) throw new Error("Failed to delete course");

                    loadCourses();
                    alert("Course deleted successfully!");
                } catch (err) {
                    alert("Failed to delete course");
                    console.error(err);
                }
            }

            // Initial load
            loadCourses();
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./js/adminlte.js"></script>
    </body>
</html>
