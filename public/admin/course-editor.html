<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <title>Admin — Course Editor</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="./css/adminlte.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />
        <style>
            .section-item {
                cursor: move;
            }
            .lesson-item {
                cursor: move;
            }
            .active-item {
                background-color: #e3f2fd !important;
            }
        </style>
    </head>
    <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
        <script>
            const token = localStorage.getItem("token");
            if (!token) window.location.href = "./login.html";

            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get("id");
            console.log("[DEBUG] courseId =", courseId);
            if (!courseId) {
                alert("No course ID provided");
                window.location.href = "./courses.html";
            }
        </script>

        <div class="app-wrapper">
            <!-- SIDEBAR -->
            <aside
                class="app-sidebar bg-body-secondary shadow"
                data-bs-theme="dark"
            >
                <div class="sidebar-brand">
                    <a href="./index.html" class="brand-link">
                        <img
                            src="./assets/img/AdminLTELogo.png"
                            alt="Logo"
                            class="brand-image opacity-75 shadow"
                        />
                        <span class="brand-text fw-light">Admin Panel</span>
                    </a>
                </div>
                <div class="sidebar-wrapper">
                    <nav class="mt-2">
                        <ul class="nav sidebar-menu flex-column">
                            <li class="nav-item">
                                <a href="./index.html" class="nav-link">
                                    <i class="nav-icon bi bi-speedometer2"></i>
                                    <p>Dashboard</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a
                                    href="./courses.html"
                                    class="nav-link active"
                                >
                                    <i class="nav-icon bi bi-journal-text"></i>
                                    <p>Courses</p>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </aside>

            <!-- HEADER -->
            <nav class="app-header navbar navbar-expand bg-body">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a
                                class="nav-link"
                                data-lte-toggle="sidebar"
                                href="#"
                                role="button"
                            >
                                <i class="bi bi-list"></i>
                            </a>
                        </li>
                    </ul>
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a
                                href="./courses.html"
                                class="btn btn-sm btn-secondary me-2"
                            >
                                <i class="bi bi-arrow-left"></i> Back to Courses
                            </a>
                        </li>
                        <li class="nav-item">
                            <button
                                id="logoutBtn"
                                class="btn btn-sm btn-danger"
                            >
                                Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- MAIN CONTENT -->
            <main class="app-main">
                <div class="app-content-header">
                    <div class="container-fluid">
                        <h3 class="mb-0" id="courseTitle">Loading...</h3>
                        <p class="text-muted" id="courseDesc"></p>
                    </div>
                </div>

                <div class="app-content">
                    <div class="container-fluid">
                        <div class="row">
                            <!-- SECTIONS -->
                            <div class="col-lg-4">
                                <div class="card">
                                    <div
                                        class="card-header d-flex justify-content-between align-items-center"
                                    >
                                        <h5 class="mb-0">Sections</h5>
                                        <button
                                            class="btn btn-sm btn-success"
                                            onclick="openSectionModal()"
                                        >
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                    <div class="card-body p-0">
                                        <ul
                                            class="list-group list-group-flush"
                                            id="sectionsList"
                                        ></ul>
                                    </div>
                                </div>
                            </div>

                            <!-- LESSONS -->
                            <div class="col-lg-8">
                                <div class="card">
                                    <div
                                        class="card-header d-flex justify-content-between align-items-center"
                                    >
                                        <h5 class="mb-0">
                                            Lessons
                                            <span
                                                id="selectedSectionName"
                                                class="badge bg-secondary ms-2"
                                            ></span>
                                        </h5>
                                        <button
                                            class="btn btn-sm btn-success"
                                            onclick="openLessonModal()"
                                            id="addLessonBtn"
                                            disabled
                                        >
                                            <i class="bi bi-plus"></i> Add
                                            Lesson
                                        </button>
                                    </div>
                                    <div class="card-body">
                                        <div
                                            id="lessonsContainer"
                                            class="text-muted"
                                        >
                                            Select a section to view lessons
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- SECTION MODAL -->
        <div class="modal fade" id="sectionModal" tabindex="-1">
            <div class="modal-dialog">
                <form id="sectionForm" class="modal-content">
                    <div class="modal-header">
                        <h5 id="sectionModalTitle">Create Section</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="sectionId" />
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Order Index</label>
                            <input
                                type="number"
                                name="orderIndex"
                                class="form-control"
                                value="0"
                            />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- LESSON MODAL -->
        <div class="modal fade" id="lessonModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <form id="lessonForm" class="modal-content">
                    <div class="modal-header">
                        <h5 id="lessonModalTitle">Create Lesson</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="lessonId" />
                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                required
                            />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Content Type</label>
                            <select
                                name="contentType"
                                class="form-select"
                                onchange="toggleContentFields(this.value)"
                            >
                                <option value="text">Text</option>
                                <option value="video">Video</option>
                                <option value="quiz">Quiz (create test)</option>
                            </select>
                        </div>

                        <!-- Quiz creation options (visible only when Content Type = quiz) -->
                        <div
                            class="mb-3"
                            id="quizOptions"
                            style="display: none"
                        >
                            <label class="form-label">Quiz Options</label>
                            <input
                                type="text"
                                name="quizTitle"
                                class="form-control mb-2"
                                placeholder="Quiz title (optional)"
                            />
                            <div class="form-check">
                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    name="createQuiz"
                                    id="createQuizCheckbox"
                                />
                                <label
                                    class="form-check-label"
                                    for="createQuizCheckbox"
                                >
                                    Create quiz after saving lesson
                                </label>
                            </div>
                        </div>
                        <div
                            class="mb-3"
                            id="videoUrlField"
                            style="display: none"
                        >
                            <label class="form-label">Video URL</label>
                            <input
                                type="url"
                                name="videoUrl"
                                class="form-control"
                                placeholder="https://..."
                            />
                        </div>
                        <div class="mb-3" id="textContentField">
                            <label class="form-label"
                                >Text Content (Markdown)</label
                            >
                            <textarea
                                name="textContent"
                                class="form-control"
                                rows="8"
                            ></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Order Index</label>
                            <input
                                type="number"
                                name="orderIndex"
                                class="form-control"
                                value="0"
                            />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Cancel
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- QUIZ MODAL -->
        <div class="modal fade" id="quizModal" tabindex="-1">
            <div class="modal-dialog modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 id="quizModalTitle">Manage Quizzes</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="currentLessonId" />

                        <!-- Create Quiz Form -->
                        <div class="card mb-3">
                            <div class="card-header">
                                <h6 class="mb-0">Create New Quiz</h6>
                            </div>
                            <div class="card-body">
                                <form id="createQuizForm">
                                    <div class="row">
                                        <div class="col-md-8">
                                            <input
                                                type="text"
                                                name="title"
                                                class="form-control"
                                                placeholder="Quiz Title"
                                                required
                                            />
                                        </div>
                                        <div class="col-md-4">
                                            <button
                                                type="submit"
                                                class="btn btn-success w-100"
                                            >
                                                <i class="bi bi-plus"></i> Add
                                                Quiz
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- Quizzes List -->
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">Existing Quizzes</h6>
                            </div>
                            <div class="card-body">
                                <div id="quizzesList">
                                    <div class="text-center">
                                        <div class="spinner-border"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Close
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const API_BASE = "/api";
            const ADMIN_API = `${API_BASE}/admin`;
            const authHeaders = () => ({
                "Content-Type": "application/json",
                Authorization: `Bearer ${localStorage.getItem("token")}`,
            });

            // Debug: wrap global fetch to log URL, options, courseId and response (safe parsing)
            (function wrapFetchForDebug() {
                try {
                    const _originalFetch = window.fetch.bind(window);
                    window.fetch = async (url, options) => {
                        try {
                            console.log(
                                "[DEBUG] courseId=",
                                courseId,
                                "fetch ->",
                                url,
                                options,
                            );
                        } catch (e) {
                            // courseId may be undefined in some contexts
                        }
                        const res = await _originalFetch(url, options);
                        try {
                            console.log(
                                "[DEBUG] response for",
                                url,
                                "status",
                                res.status,
                            );
                            const ctype =
                                res.headers.get &&
                                res.headers.get("content-type");
                            const contentType = ctype || "";
                            if (contentType.includes("application/json")) {
                                const data = await res.clone().json();
                                console.log("[DEBUG] json", url, data);
                            } else {
                                const txt = await res.clone().text();
                                console.log(
                                    "[DEBUG] text",
                                    url,
                                    txt.slice(0, 500),
                                );
                            }
                        } catch (err) {
                            console.log(
                                "[DEBUG] response parse error for",
                                url,
                                err,
                            );
                        }
                        return res;
                    };
                } catch (err) {
                    console.log("[DEBUG] failed to wrap fetch", err);
                }
            })();

            let selectedSectionId = null;
            let currentLessonForQuiz = null;

            // Logout
            document
                .getElementById("logoutBtn")
                .addEventListener("click", () => {
                    localStorage.removeItem("token");
                    window.location.href = "./login.html";
                });

            // Toggle content fields (now supports 'quiz' type and shows quiz options)
            function toggleContentFields(type) {
                const videoField = document.getElementById("videoUrlField");
                const textField = document.getElementById("textContentField");
                const quizField = document.getElementById("quizOptions");
                if (type === "video") {
                    videoField.style.display = "block";
                    textField.style.display = "none";
                    if (quizField) quizField.style.display = "none";
                } else if (type === "quiz") {
                    // for quiz show quiz options, hide other content inputs
                    if (videoField) videoField.style.display = "none";
                    if (textField) textField.style.display = "none";
                    if (quizField) quizField.style.display = "block";
                } else {
                    // default: text
                    videoField.style.display = "none";
                    textField.style.display = "block";
                    if (quizField) quizField.style.display = "none";
                }
            }

            // Load course info
            async function loadCourse() {
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}`,
                        {
                            headers: authHeaders(),
                        },
                    );
                    if (!res.ok) throw new Error("Failed to load course");
                    const course = await res.json();
                    document.getElementById("courseTitle").textContent =
                        course.title;
                    document.getElementById("courseDesc").textContent =
                        course.description || "";
                } catch (err) {
                    console.error(err);
                    alert("Failed to load course");
                }
            }

            // Load sections for THIS course only
            async function loadSections() {
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) throw new Error("Failed to load sections");
                    const sections = await res.json();
                    renderSections(sections);
                } catch (err) {
                    console.error(err);
                    document.getElementById("sectionsList").innerHTML =
                        '<li class="list-group-item text-danger">Failed to load</li>';
                }
            }

            function renderSections(sections) {
                const list = document.getElementById("sectionsList");
                if (!sections.length) {
                    list.innerHTML =
                        '<li class="list-group-item text-muted">No sections yet</li>';
                    return;
                }

                list.innerHTML = sections
                    .map(
                        (s) => `
                <li class="list-group-item section-item ${selectedSectionId === s.id ? "active-item" : ""}"
                    onclick="selectSection(${s.id}, '${s.title.replace(/'/g, "\\'")}')">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${s.title}</strong>
                            <div class="small text-muted">Order: ${s.orderIndex || 0}</div>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-warning" onclick="event.stopPropagation(); editSection(${s.id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteSection(${s.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </li>
            `,
                    )
                    .join("");
            }

            // Select section
            function selectSection(sectionId, sectionName) {
                selectedSectionId = sectionId;
                document.getElementById("selectedSectionName").textContent =
                    sectionName;
                document.getElementById("addLessonBtn").disabled = false;
                loadLessons(sectionId);
                loadSections(); // Re-render to highlight
            }

            // Load lessons
            async function loadLessons(sectionId) {
                const container = document.getElementById("lessonsContainer");
                container.innerHTML =
                    '<div class="text-center"><div class="spinner-border"></div></div>';

                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${sectionId}/lessons`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) throw new Error("Failed to load lessons");
                    const lessons = await res.json();
                    renderLessons(lessons);
                } catch (err) {
                    console.error(err);
                    container.innerHTML =
                        '<div class="alert alert-danger">Failed to load lessons</div>';
                }
            }

            function renderLessons(lessons) {
                const container = document.getElementById("lessonsContainer");
                if (!lessons.length) {
                    container.innerHTML =
                        '<div class="alert alert-info">No lessons yet. Click "Add Lesson" to create one.</div>';
                    return;
                }

                container.innerHTML = lessons
                    .map(
                        (l) => `
                <div class="card mb-3 lesson-item">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1">${l.title}</h6>
                                <span class="badge bg-primary">${l.contentType || "text"}</span>
                                <span class="badge bg-secondary">Order: ${l.orderIndex || 0}</span>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-info me-1" onclick="openQuizManager(${l.id})">
                                    <i class="bi bi-question-circle"></i> Quizzes
                                </button>
                                <button class="btn btn-sm btn-warning me-1" onclick="editLesson(${l.id})">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteLesson(${l.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                        ${l.textContent ? `<div class="mt-2 small text-muted">${l.textContent.substring(0, 100)}...</div>` : ""}
                        ${l.videoUrl ? `<div class="mt-2 small"><a href="${l.videoUrl}" target="_blank">${l.videoUrl}</a></div>` : ""}
                    </div>
                </div>
            `,
                    )
                    .join("");
            }

            // Section CRUD
            function openSectionModal(section = null) {
                const form = document.getElementById("sectionForm");
                form.sectionId.value = section ? section.id : "";
                form.title.value = section ? section.title : "";
                form.orderIndex.value = section ? section.orderIndex || 0 : 0;
                document.getElementById("sectionModalTitle").textContent =
                    section ? "Edit Section" : "Create Section";
                new bootstrap.Modal(
                    document.getElementById("sectionModal"),
                ).show();
            }

            document
                .getElementById("sectionForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const sectionId = form.sectionId.value;
                    const payload = {
                        title: form.title.value.trim(),
                        orderIndex: Number(form.orderIndex.value),
                    };

                    try {
                        const url = sectionId
                            ? `${ADMIN_API}/courses/${courseId}/sections/${sectionId}`
                            : `${ADMIN_API}/courses/${courseId}/sections`;
                        const method = sectionId ? "PUT" : "POST";

                        const res = await fetch(url, {
                            method,
                            headers: authHeaders(),
                            body: JSON.stringify(payload),
                        });

                        if (!res.ok) throw new Error("Failed to save section");

                        bootstrap.Modal.getInstance(
                            document.getElementById("sectionModal"),
                        ).hide();
                        loadSections();
                        alert("Section saved successfully!");
                    } catch (err) {
                        alert("Failed to save section");
                        console.error(err);
                    }
                });

            async function editSection(id) {
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${id}`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) throw new Error("Failed to load section");
                    const section = await res.json();
                    openSectionModal(section);
                } catch (err) {
                    alert("Failed to load section");
                    console.error(err);
                }
            }

            async function deleteSection(id) {
                if (!confirm("Delete this section and all its lessons?"))
                    return;

                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${id}`,
                        {
                            method: "DELETE",
                            headers: authHeaders(),
                        },
                    );
                    if (!res.ok) throw new Error("Failed to delete");
                    loadSections();
                    if (selectedSectionId === id) {
                        selectedSectionId = null;
                        document.getElementById("lessonsContainer").innerHTML =
                            "Select a section to view lessons";
                        document.getElementById("addLessonBtn").disabled = true;
                    }
                    alert("Section deleted successfully!");
                } catch (err) {
                    alert("Failed to delete section");
                    console.error(err);
                }
            }

            // Lesson CRUD
            function openLessonModal(lesson = null) {
                const form = document.getElementById("lessonForm");
                form.lessonId.value = lesson ? lesson.id : "";
                form.title.value = lesson ? lesson.title : "";
                form.contentType.value = lesson
                    ? lesson.contentType || "text"
                    : "text";
                form.videoUrl.value = lesson ? lesson.videoUrl || "" : "";
                form.textContent.value = lesson ? lesson.textContent || "" : "";
                form.orderIndex.value = lesson ? lesson.orderIndex || 0 : 0;
                toggleContentFields(form.contentType.value);
                document.getElementById("lessonModalTitle").textContent = lesson
                    ? "Edit Lesson"
                    : "Create Lesson";
                new bootstrap.Modal(
                    document.getElementById("lessonModal"),
                ).show();
            }

            document
                .getElementById("lessonForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    if (!selectedSectionId)
                        return alert("Select a section first");

                    const form = e.target;
                    const lessonId = form.lessonId.value;
                    // Determine if the user selected quiz type; to keep compatibility with server validation,
                    // when contentType === 'quiz' we'll create a lesson with 'text' contentType (server accepts 'text'/'video')
                    // and then create a quiz linked to the newly created lesson.
                    const selectedContentType = form.contentType.value;
                    const isQuizType = selectedContentType === "quiz";

                    const payload = {
                        title: form.title.value.trim(),
                        contentType: isQuizType ? "text" : selectedContentType,
                        videoUrl: form.videoUrl.value.trim() || null,
                        textContent: form.textContent.value.trim(),
                        orderIndex: Number(form.orderIndex.value),
                    };

                    try {
                        const url = lessonId
                            ? `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons/${lessonId}`
                            : `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons`;
                        const method = lessonId ? "PUT" : "POST";

                        console.debug(
                            "[course-editor] saveLesson url, method:",
                            url,
                            method,
                            payload,
                        );

                        const res = await fetch(url, {
                            method,
                            headers: authHeaders(),
                            body: JSON.stringify(payload),
                        });

                        // read response body to show helpful errors
                        const resText = await res.text().catch(() => null);
                        let resJson = null;
                        try {
                            resJson = resText ? JSON.parse(resText) : null;
                        } catch (parseErr) {
                            // not JSON
                        }

                        console.debug(
                            "[course-editor] saveLesson status:",
                            res.status,
                            resJson || resText,
                        );

                        if (!res.ok) {
                            const msg =
                                (resJson && resJson.error) ||
                                resText ||
                                `Status ${res.status}`;
                            throw new Error(msg);
                        }

                        // use returned lesson object for later operations (quiz creation)
                        const returnedLesson = resJson || null;

                        // If user requested a quiz for this lesson and this was a CREATE (not update),
                        // create a quiz tied to the created lesson.
                        const createQuizChecked =
                            form.createQuiz && form.createQuiz.checked;
                        const quizTitle =
                            form.quizTitle && form.quizTitle.value.trim();

                        if (
                            !lessonId &&
                            isQuizType &&
                            createQuizChecked &&
                            returnedLesson &&
                            returnedLesson.id
                        ) {
                            try {
                                const quizPayload = {
                                    title: quizTitle || "New Quiz",
                                    lessonId: Number(returnedLesson.id),
                                };
                                const quizUrl = `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons/${returnedLesson.id}/quizzes`;
                                console.debug(
                                    "[course-editor] creating quiz",
                                    quizUrl,
                                    quizPayload,
                                );
                                const quizRes = await fetch(quizUrl, {
                                    method: "POST",
                                    headers: authHeaders(),
                                    body: JSON.stringify(quizPayload),
                                });

                                const quizResText = await quizRes
                                    .text()
                                    .catch(() => null);
                                let quizResJson = null;
                                try {
                                    quizResJson = quizResText
                                        ? JSON.parse(quizResText)
                                        : null;
                                } catch (_) {}

                                if (!quizRes.ok) {
                                    console.error(
                                        "[course-editor] create quiz failed",
                                        quizRes.status,
                                        quizResJson || quizResText,
                                    );
                                    // non-fatal: still keep lesson created but inform user
                                    alert(
                                        "Lesson created, but failed to create quiz: " +
                                            (quizResJson?.error ||
                                                quizResText ||
                                                quizRes.status),
                                    );
                                } else {
                                    console.debug(
                                        "[course-editor] quiz created",
                                        quizResJson || quizResText,
                                    );
                                }
                            } catch (quizErr) {
                                console.error(
                                    "[course-editor] create quiz exception:",
                                    quizErr,
                                );
                                alert(
                                    "Lesson created, but error occurred while creating quiz.",
                                );
                            }
                        }

                        bootstrap.Modal.getInstance(
                            document.getElementById("lessonModal"),
                        ).hide();
                        loadLessons(selectedSectionId);
                        alert("Lesson saved successfully!");
                    } catch (err) {
                        alert("Failed to save lesson: " + (err.message || err));
                        console.error(
                            "[course-editor] saveLesson exception:",
                            err,
                        );
                    }
                });

            async function editLesson(id) {
                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons/${id}`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) throw new Error("Failed to load lesson");
                    const lesson = await res.json();
                    openLessonModal(lesson);
                } catch (err) {
                    alert("Failed to load lesson");
                    console.error(err);
                }
            }

            async function deleteLesson(id) {
                if (!confirm("Delete this lesson?")) return;

                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons/${id}`,
                        { method: "DELETE", headers: authHeaders() },
                    );
                    if (!res.ok) throw new Error("Failed to delete");
                    loadLessons(selectedSectionId);
                    alert("Lesson deleted successfully!");
                } catch (err) {
                    alert("Failed to delete lesson");
                    console.error(err);
                }
            }

            // Quiz Manager
            async function openQuizManager(lessonId) {
                currentLessonForQuiz = lessonId;
                document.getElementById("currentLessonId").value = lessonId;

                const modal = new bootstrap.Modal(
                    document.getElementById("quizModal"),
                );
                modal.show();

                await loadQuizzes(lessonId);
            }

            async function loadQuizzes(lessonId) {
                const container = document.getElementById("quizzesList");
                container.innerHTML =
                    '<div class="text-center"><div class="spinner-border"></div></div>';

                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons/${lessonId}/quizzes`,
                        { headers: authHeaders() },
                    );
                    if (!res.ok) throw new Error("Failed to load quizzes");
                    const quizzes = await res.json();
                    renderQuizzes(quizzes, lessonId);
                } catch (err) {
                    console.error(err);
                    container.innerHTML =
                        '<div class="alert alert-danger">Failed to load quizzes</div>';
                }
            }

            function renderQuizzes(quizzes, lessonId) {
                const container = document.getElementById("quizzesList");

                if (!quizzes.length) {
                    container.innerHTML =
                        '<div class="alert alert-info">No quizzes yet. Create one above.</div>';
                    return;
                }

                container.innerHTML = quizzes
                    .map(
                        (q) => `
                    <div class="card mb-2">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-0">${q.title}</h6>
                                    <small class="text-muted">Quiz ID: ${q.id}</small>
                                </div>
                                <div>
                                    <a href="./quiz-editor.html?courseId=${courseId}&sectionId=${selectedSectionId}&lessonId=${lessonId}&quizId=${q.id}"
                                       class="btn btn-sm btn-primary me-1">
                                        <i class="bi bi-pencil"></i> Edit Questions
                                    </a>
                                    <button class="btn btn-sm btn-danger" onclick="deleteQuiz(${q.id}, ${lessonId})">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `,
                    )
                    .join("");
            }

            // Create Quiz
            document
                .getElementById("createQuizForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const form = e.target;
                    const lessonId =
                        document.getElementById("currentLessonId").value;

                    const payload = {
                        title: form.title.value.trim(),
                        lessonId: Number(lessonId),
                    };

                    try {
                        const res = await fetch(
                            `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons/${lessonId}/quizzes`,
                            {
                                method: "POST",
                                headers: authHeaders(),
                                body: JSON.stringify(payload),
                            },
                        );

                        if (!res.ok) throw new Error("Failed to create quiz");

                        form.reset();
                        await loadQuizzes(lessonId);
                        alert("Quiz created successfully!");
                    } catch (err) {
                        alert("Failed to create quiz");
                        console.error(err);
                    }
                });

            // Delete Quiz
            async function deleteQuiz(quizId, lessonId) {
                if (!confirm("Delete this quiz and all its questions?")) return;

                try {
                    const res = await fetch(
                        `${ADMIN_API}/courses/${courseId}/sections/${selectedSectionId}/lessons/${lessonId}/quizzes/${quizId}`,
                        {
                            method: "DELETE",
                            headers: authHeaders(),
                        },
                    );

                    if (!res.ok) throw new Error("Failed to delete quiz");

                    await loadQuizzes(lessonId);
                    alert("Quiz deleted successfully!");
                } catch (err) {
                    alert("Failed to delete quiz");
                    console.error(err);
                }
            }

            // Initial load
            loadCourse();
            loadSections();
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./js/adminlte.js"></script>
    </body>
</html>
